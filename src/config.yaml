seed: 42

data:
  # Dataset identifier (used for file naming: data/processed/{fname}...)
  fname: Video_Games

  # Raw file extension (e.g., 'json.gz', 'jsonl.gz', 'parquet')
  # Note: Magazine data was 'jsonl.gz'
  raw_ext: jsonl.gz

  # Aspect Term Extraction (ATE) settings
  run_ate: true
  text_col: clean_text       # Column containing cleaned text
  aspect_col: aspect         # Column to store/read extracted aspects

  # Data Split settings
  test_size: 0.2             # 20% of total data used for testing

args:
  # Hardware / System
  device: cuda               # 'cuda' or 'cpu'

  # Training Hyperparameters
  batch_size: 128
  num_epochs: 100
  lr: 0.001                  # Learning Rate
  dropout: 0.1               # Dropout rate
  patience: 5                # Early stopping patience (stop if val_loss doesn't improve)
  val_ratio: 0.125           # Proportion of training set to use for validation

  # Model Architecture (Hyperparameters for ProposedModel)
  id_dim: 128                # Dimension for User/Item ID Embeddings
  num_heads: 8               # Number of Self-Attention Heads (Must divide id_dim)
  cnn_filters: 100           # Number of filters in CNN layer
  cnn_kernel_size: 5         # Kernel size for CNN (window size)
  ffn_dim: 2048              # Dimension of Feed-Forward Network in Attention Block